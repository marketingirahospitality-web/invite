<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Adaab — The Art of Tehzeeb. A hosted mobile arrival experience." />
  <title>Adaab · The Art of Tehzeeb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ========================================================================
       ADAAB · THE ART OF TEHZEEB (Blue, White, & Black Mobile-Optimized)
       ======================================================================== */

    :root {
      --ink-deep:        #000000;          
      --ink:             #03050c;          
      --ink-soft:        #08101e;          
      --midnight:        #020b18;          
      --jewel:           #082f62;          
      
      --white:           #ffffff;          
      --white-soft:      #cbd5e1;          
      --champagne:       #f8fafc;          
      --gold:            #082f62;          
      --gold-bright:     #38bdf8;          
      --gold-deep:       #031833;          

      --glass-edge:      rgba(255, 255, 255, 0.08);

      --serif: "Cormorant Garamond", "EB Garamond", Georgia, serif;
      --sans:  "Jost", "Helvetica Neue", system-ui, sans-serif;

      --ease-grace:    cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-curtain: cubic-bezier(0.16, 0.84, 0.44, 1);

      --radius-card: 28px;
      --radius-image: 20px;
    }

    *,
    *::before,
    *::after { box-sizing: border-box; }

    html, body { 
      height: 100dvh; 
      width: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: none; 
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sans);
      font-weight: 300;
      color: var(--white);
      background: #000000 linear-gradient(180deg, #020b18 0%, #000000 100%);
      display: grid;
      place-items: center;
    }

    img { max-width: 100%; display: block; }
    button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    .stage {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .stage__candle {
      position: absolute;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.35;
      animation: breathe 10s ease-in-out infinite;
      will-change: transform, opacity;
      width: 80vmin; height: 80vmin;
      left: 50%; top: -20vmin;
      transform: translateX(-50%);
      background: radial-gradient(closest-side, rgba(8, 47, 98, 0.6), transparent 100%);
    }

    .stage__arches {
      position: absolute;
      height: 35vh;
      width: 130px;
      opacity: 0.15;
      bottom: 0;
    }
    .stage__arches--left  { left: -10px; }
    .stage__arches--right { right: -10px; transform: scaleX(-1); }

    .stage__vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 90% at 50% 50%, transparent 60%, rgba(0,0,0,0.95) 100%);
    }

    .experience {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100dvh;
      display: grid;
      place-items: center;
      padding: 12px 14px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 350px; 
      padding: 16px 18px;
      border-radius: var(--radius-card);
      background: linear-gradient(180deg, rgba(8, 15, 30, 0.9) 0%, rgba(0, 0, 0, 0.98) 100%);
      border: 1px solid var(--glass-edge);
      box-shadow: 
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 15px 40px rgba(0, 0, 0, 0.9);
      overflow: hidden;
      animation: card-rise 1000ms var(--ease-curtain) both;
    }

    .card__edge-light {
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: conic-gradient(from 210deg at 50% 50%, rgba(8,47,98,0) 0deg, rgba(8,47,98,0.4) 120deg, rgba(255,255,255,0.2) 240deg, rgba(8,47,98,0) 360deg);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
      opacity: 0.7;
    }

    .card__label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--sans);
      font-weight: 400;
      font-size: 8px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.85;
      padding-bottom: 12px;
    }
    .card__label-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--white);
      box-shadow: 0 0 6px rgba(255,255,255,0.9);
    }
    .card__label-sep { opacity: 0.3; color: var(--jewel); }

    .hero {
      margin: 0;
      position: relative;
    }

    .hero__frame {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: var(--radius-image);
      overflow: hidden;
      background: #020914;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.1) inset,
        0 10px 20px rgba(0,0,0,0.6);
    }

    .hero__placeholder-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.85;
      pointer-events: none;
    }

    .hero__image {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0; 
      z-index: 2; 
      transition: opacity 400ms var(--ease-grace);
    }

    .hero__spotlight {
      position: absolute;
      inset: 0;
      background: radial-gradient(50% 45% at 50% 0%, rgba(255, 255, 255, 0.15), transparent 70%);
      pointer-events: none;
      z-index: 3;
    }

    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .hero__corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: rgba(255, 255, 255, 0.4);
      border-style: solid;
      border-width: 0;
      z-index: 4;
    }
    .hero__corner--tl { top: 12px; left: 12px; border-top-width: 1px; border-left-width: 1px; border-top-left-radius: 4px; }
    .hero__corner--tr { top: 12px; right: 12px; border-top-width: 1px; border-right-width: 1px; border-top-right-radius: 4px; }
    .hero__corner--bl { bottom: 12px; left: 12px; border-bottom-width: 1px; border-left-width: 1px; border-bottom-left-radius: 4px; }
    .hero__corner--br { bottom: 12px; right: 12px; border-bottom-width: 1px; border-right-width: 1px; border-bottom-right-radius: 4px; }

    .arrival {
      text-align: center;
      padding: 10px 0 2px;
    }

    .arrival__kicker {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.75;
      margin: 0 0 6px;
    }

    .arrival__headline {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 24px;
      line-height: 1.1;
      color: var(--white);
      margin: 0;
    }

    .arrival__headline-em {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--white-soft);
      opacity: 0.9;
    }

    .arrival__sub {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--white-soft);
      opacity: 0.55;
      margin: 4px 0 0;
    }

    .waveform {
      position: relative;
      width: 100%;
      height: 48px;
      margin: 14px 0 6px;
      padding: 0 2px;
    }

    .waveform__inner {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 3.5px;
    }

    .bar {
      flex: 1 1 0;
      height: 100%; 
      background: linear-gradient(180deg, var(--white) 0%, var(--gold-bright) 45%, var(--jewel) 100%);
      border-radius: 1px;
      transform-origin: bottom;
      transform: scaleY(0); 
      opacity: 0.35;
      will-change: transform;
      transition: transform 180ms cubic-bezier(0.16, 1, 0.3, 1), opacity 300ms ease;
    }

    .waveform.is-playing .bar { 
      opacity: 0.85; 
      transition: transform 0ms, opacity 300ms ease; 
    }

    .waveform__baseline {
      position: absolute;
      left: 2px; right: 2px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .player__progress {
      position: relative;
      width: 100%;
      height: 32px; 
      display: flex;
      align-items: center;
      cursor: pointer;
      outline: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .player__progress-track,
    .player__progress-fill {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 2px;
      border-radius: 2px;
      pointer-events: none;
    }
    .player__progress-track {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-50%);
    }
    .player__progress-fill {
      background: linear-gradient(90deg, var(--jewel), var(--white));
      width: 0%;
      right: auto;
      transform: translateY(-50%);
      transition: width 100ms linear;
    }
    .player__progress-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 10px; height: 10px; 
      border-radius: 50%;
      background: var(--white);
      transform: translate(-50%, -50%); 
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      pointer-events: none;
    }

    .player__times {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-family: var(--sans);
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--white-soft);
      opacity: 0.5;
    }

    .player__center {
      display: grid;
      place-items: center;
      padding: 4px 0;
    }

    .play {
      --size: 60px;
      position: relative;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      display: grid;
      place-items: center;
      isolation: isolate;
      -webkit-tap-highlight-color: transparent;
    }

    .play__halo {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(closest-side, rgba(8, 47, 98, 0.45), transparent 75%);
      z-index: -1;
      filter: blur(1px);
    }

    .play__ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 220deg, transparent, rgba(255,255,255,0.35), transparent 50%);
      -webkit-mask: radial-gradient(circle, transparent calc(50% - 1px), #000 calc(50% - 1px));
              mask: radial-gradient(circle, transparent calc(50% - 1px), #000 calc(50% - 1px));
      opacity: 0.4;
    }

    /* Elegant CSS Grid Container that holds both the play and pause state beautifully */
    .play__face {
      position: relative;
      width: 100%; height: 100%;
      border-radius: 50%;
      display: grid;
      place-items: center; /* PERFECT CENTER FOR ALL stacked grid cells */
      color: var(--white);
      background: radial-gradient(120% 120% at 30% 25%, #ffffff 0%, #0d3873 40%, #000000 100%);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.3) inset,
        0 -1px 3px rgba(8, 47, 98, 0.4) inset,
        0 8px 16px rgba(0, 0, 0, 0.6);
      transition: transform 150ms var(--ease-grace);
    }

    /* Fixed icon positions using CSS Grid stacking context */
    .play__icon {
      grid-area: 1 / 1; /* Stacks both icons in exactly the same grid cell */
      width: 22px;
      height: 22px;
      color: var(--white);
      transition: opacity 250ms var(--ease-grace), transform 250ms var(--ease-grace);
    }

    .play__icon--play {
      transform: translateX(1.5px) scale(1); /* Slight horizontal offset for perfect optical alignment of triangle */
      opacity: 1;
    }

    .play__icon--pause {
      transform: scale(0.8);
      opacity: 0;
    }

    /* Active / Played State micro-transitions */
    .play[aria-pressed="true"] .play__icon--play  { 
      opacity: 0; 
      transform: translateX(1.5px) scale(0.8);
    }
    
    .play[aria-pressed="true"] .play__icon--pause { 
      opacity: 1; 
      transform: scale(1);
    }

    .play[aria-pressed="true"] .play__face {
      animation: pulse 2s ease-in-out infinite;
    }

    .play:active .play__face { transform: scale(0.94); }

    .helper {
      margin: 4px 0 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .helper__text {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 8.5px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white-soft);
      opacity: 0.5;
    }
    .helper__dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--white);
      opacity: 0.7;
    }

    .reveal {
      opacity: 0;
      transform: translateY(6px);
      animation: reveal 800ms var(--ease-curtain) forwards;
      animation-delay: calc(var(--reveal-delay, 0ms) + 100ms);
    }

    @keyframes card-rise {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes reveal {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 0.45; }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 1px 0 rgba(255, 255, 255, 0.3) inset, 0 -1px 3px rgba(8, 47, 98, 0.4) inset, 0 8px 16px rgba(0, 0, 0, 0.6); }
      50%      { box-shadow: 0 1px 0 rgba(255, 255, 255, 0.4) inset, 0 -1px 3px rgba(8, 47, 98, 0.5) inset, 0 10px 20px rgba(8, 47, 98, 0.5); }
    }
  </style>
</head>
<body>
  <div class="stage" aria-hidden="true">
    <div class="stage__candle"></div>

    <svg class="stage__arches stage__arches--left" viewBox="0 0 320 720" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <linearGradient id="archLeft" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#082f62" stop-opacity="0.0" />
          <stop offset="55%" stop-color="#082f62" stop-opacity="0.15" />
          <stop offset="100%" stop-color="#082f62" stop-opacity="0.0" />
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#archLeft)" stroke-width="1">
        <path d="M40 700 V340 Q40 220 130 220 Q220 220 220 340 V700" />
        <path d="M70 700 V360 Q70 260 130 260 Q190 260 190 360 V700" />
      </g>
    </svg>

    <svg class="stage__arches stage__arches--right" viewBox="0 0 320 720" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <linearGradient id="archRight" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#082f62" stop-opacity="0.0" />
          <stop offset="55%" stop-color="#082f62" stop-opacity="0.15" />
          <stop offset="100%" stop-color="#082f62" stop-opacity="0.0" />
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#archRight)" stroke-width="1">
        <path d="M100 700 V340 Q100 220 190 220 Q280 220 280 340 V700" />
        <path d="M130 700 V360 Q130 260 190 260 Q250 260 250 360 V700" />
      </g>
    </svg>

    <div class="stage__vignette"></div>
  </div>

  <main class="experience" role="main">
    <article class="card" aria-label="Adaab arrival experience">
      <span class="card__edge-light" aria-hidden="true"></span>

      <div class="card__label reveal" data-reveal-delay="0">
        <span class="card__label-dot" aria-hidden="true"></span>
        <span>Adaab</span>
        <span class="card__label-sep" aria-hidden="true">|</span>
        <span>The Art of Tehzeeb</span>
      </div>

      <figure class="hero reveal" data-reveal-delay="100">
        <div class="hero__frame">
          <svg class="hero__placeholder-svg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <radialGradient id="blueGlow" cx="50%" cy="30%" r="60%">
                <stop offset="0%" stop-color="#082f62" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="400" height="300" fill="url(#blueGlow)" />
            <path d="M200 40 Q250 120 250 260 L150 260 Q150 120 200 40 Z" fill="none" stroke="#082f62" stroke-width="1.5" opacity="0.4"/>
            <path d="M200 65 Q240 135 240 260 L160 260 Q160 135 200 65 Z" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.25"/>
            <circle cx="200" cy="150" r="45" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 3" opacity="0.3"/>
            <circle cx="200" cy="40" r="2.5" fill="#ffffff" opacity="0.6"/>
          </svg>

          <!-- Upgraded thumbnail pointing to cover.jpg hosted on raw.githubusercontent.com -->
          <img
            class="hero__image"
            id="heroImage"
            src="https://raw.githubusercontent.com/marketingirahospitality-web/invite/main/cover.jpg"
            alt="A softly lit hosted setting in the spirit of hospitality"
          />

          <div class="hero__spotlight" aria-hidden="true"></div>
          <div class="hero__overlay" aria-hidden="true"></div>
          <div class="hero__corner hero__corner--tl" aria-hidden="true"></div>
          <div class="hero__corner hero__corner--tr" aria-hidden="true"></div>
          <div class="hero__corner hero__corner--bl" aria-hidden="true"></div>
          <div class="hero__corner hero__corner--br" aria-hidden="true"></div>
        </div>
      </figure>

      <header class="arrival">
        <p class="arrival__kicker reveal" data-reveal-delay="180">An arrival, hosted</p>
        <h1 class="arrival__headline reveal" data-reveal-delay="240">
          Your arrival
          <span class="arrival__headline-em">begins here</span>
        </h1>
        <p class="arrival__sub reveal" data-reveal-delay="300">
          Press play to enter the experience
        </p>
      </header>

      <div class="waveform reveal" data-reveal-delay="360" aria-hidden="true">
        <div class="waveform__inner" id="waveform"></div>
        <div class="waveform__baseline" aria-hidden="true"></div>
      </div>

      <div class="player reveal" data-reveal-delay="420">
        <div class="player__progress" id="progress" role="slider"
             aria-label="Seek through the experience"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
          <div class="player__progress-track"></div>
          <div class="player__progress-fill" id="progressFill"></div>
          <div class="player__progress-thumb" id="progressThumb"></div>
        </div>

        <div class="player__times">
          <span class="player__time" id="currentTime">0:00</span>
          <span class="player__time player__time--total" id="totalTime">0:00</span>
        </div>

        <div class="player__center">
          <button class="play" id="playButton" type="button"
                  aria-label="Play the welcome" aria-pressed="false">
            <span class="play__halo" aria-hidden="true"></span>
            <span class="play__ring" aria-hidden="true"></span>
            <span class="play__face">
              <!-- Play Icon (Optical balance offset: translateX(1.5px)) -->
              <svg class="play__icon play__icon--play" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5.5v13a.5.5 0 0 0 .77.42l10-6.5a.5.5 0 0 0 0-.84l-10-6.5A.5.5 0 0 0 8 5.5z" fill="currentColor"/>
              </svg>
              <!-- Pause Icon -->
              <svg class="play__icon play__icon--pause" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="7" y="5" width="3.4" height="14" rx="1.1" fill="currentColor"/>
                <rect x="13.6" y="5" width="3.4" height="14" rx="1.1" fill="currentColor"/>
              </svg>
            </span>
          </button>
        </div>

        <p class="helper">
          <span class="helper__dot" aria-hidden="true"></span>
          <span class="helper__text">Tap once to play · Tap again to pause</span>
        </p>
      </div>
    </article>
  </main>

  <audio id="audio" preload="auto" playsinline webkit-playsinline>
    <source id="gitAudioSource" src="https://raw.githubusercontent.com/marketingirahospitality-web/invite/main/HILTON%20CONNECT%20VOICE%20NOTE.mp3" type="audio/mpeg" />
    <source src="https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg" type="audio/ogg" />
  </audio>

  <script>
    (() => {
      "use strict";

      const audio        = document.getElementById("audio");
      const playButton   = document.getElementById("playButton");
      const progress     = document.getElementById("progress");
      const progressFill = document.getElementById("progressFill");
      const progressThumb= document.getElementById("progressThumb");
      const currentTimeEl= document.getElementById("currentTime");
      const totalTimeEl  = document.getElementById("totalTime");
      const waveEl       = document.getElementById("waveform");
      const waveWrap     = waveEl.parentElement;
      const player       = document.querySelector(".player");
      const heroImage    = document.getElementById("heroImage");
      const sourceEl     = document.getElementById("gitAudioSource");

      /* — Background Silent GitHub MIME Fix for iOS WebKit — */
      if (sourceEl && sourceEl.src.includes("raw.githubusercontent.com")) {
        sourceEl.src = sourceEl.src.replace("raw.githubusercontent.com", "raw.githack.com");
        audio.load();
      }

      /* — Image Loader Lifecycle Setup — */
      if (heroImage) {
        if (heroImage.complete) {
          heroImage.style.opacity = "0.85";
        } else {
          heroImage.onload = () => { heroImage.style.opacity = "0.85"; };
        }
      }

      document.querySelectorAll("[data-reveal-delay]").forEach(el => {
        el.style.setProperty("--reveal-delay", `${el.dataset.revealDelay}ms`);
      });

      /* — Premium Waveform Structure — */
      const BAR_COUNT = 32; 
      const bars = [];
      const restingValues = [];

      const restingProfile = (i, total) => {
        const t = i / (total - 1);
        const arc = Math.sin(t * Math.PI);
        return 0.15 + arc * 0.55 * (0.85 + Math.random() * 0.3); 
      };

      for (let i = 0; i < BAR_COUNT; i++) {
        const bar = document.createElement("span");
        bar.className = "bar";
        restingValues.push(restingProfile(i, BAR_COUNT));
        bar.style.transform = `scaleY(0)`; 
        waveEl.appendChild(bar);
        bars.push(bar);
      }

      /* — Dynamic Audio Graph Loop Engine — */
      let rafId = null;

      function renderWaveform(t) {
        for (let i = 0; i < BAR_COUNT; i++) {
          const combinedWave = (Math.sin(t / 250 + i * 0.35) * 0.6 + Math.cos(t / 140 - i * 0.22) * 0.4) * 0.5 + 0.5;
          bars[i].style.transform = `scaleY(${Math.min(1.0, Math.max(0.05, restingValues[i] * (0.2 + combinedWave * 0.85)))})`;
        }
      }

      function loop(now) {
        if (!audio.paused) {
          renderWaveform(now);
          rafId = requestAnimationFrame(loop);
        } else {
          flatline();
        }
      }

      function flatline() {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        bars.forEach(bar => bar.style.transform = "scaleY(0)");
      }

      function setPlayingState(isPlaying) {
        playButton.setAttribute("aria-pressed", String(isPlaying));
        playButton.setAttribute("aria-label", isPlaying ? "Pause the welcome" : "Play the welcome");
        waveWrap.classList.toggle("is-playing", isPlaying);
        player.classList.toggle("is-playing", isPlaying);
        
        if (isPlaying) {
          if (!rafId) rafId = requestAnimationFrame(loop);
        } else {
          flatline();
        }
      }

      function toggle(e) {
        if (e) { e.preventDefault(); }
        if (audio.paused) {
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              setPlayingState(true);
            }).catch(() => {
              setPlayingState(false);
            });
          } else {
            setPlayingState(true);
          }
        } else {
          audio.pause();
          setPlayingState(false);
        }
      }

      playButton.addEventListener("click", toggle);

      /* — Touch Pointer Capture Seek System — */
      function seekFromEvent(clientX) {
        const rect = progress.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        if (isFinite(audio.duration) && audio.duration > 0) {
          audio.currentTime = ratio * audio.duration;
        }
        progressFill.style.width = `${ratio * 100}%`;
        progressThumb.style.left = `${ratio * 100}%`;
      }

      let dragging = false;
      progress.addEventListener("pointerdown", (e) => {
        dragging = true;
        progress.setPointerCapture(e.pointerId);
        seekFromEvent(e.clientX);
      });
      progress.addEventListener("pointermove", (e) => {
        if (dragging) seekFromEvent(e.clientX);
      });
      const endDrag = () => dragging = false;
      progress.addEventListener("pointerup", endDrag);
      progress.addEventListener("pointercancel", endDrag);

      /* — Dynamic Time Sync — */
      const fmt = (s) => {
        if (!Number.isFinite(s) || isNaN(s)) return "0:00";
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60).toString().padStart(2, "0");
        return `${m}:${sec}`;
      };

      const updateDuration = () => {
        if (isFinite(audio.duration)) {
          totalTimeEl.textContent = fmt(audio.duration);
        }
      };

      audio.addEventListener("loadedmetadata", updateDuration);
      audio.addEventListener("durationchange", updateDuration);

      audio.addEventListener("timeupdate", () => {
        const d = audio.duration || 0;
        const pct = d ? (audio.currentTime / d) * 100 : 0;
        progressFill.style.width = `${pct}%`;
        progressThumb.style.left = `${pct}%`;
        currentTimeEl.textContent = fmt(audio.currentTime);
        progress.setAttribute("aria-valuenow", pct.toFixed(1));
        if (totalTimeEl.textContent === "0:00" && d > 0) {updateDuration();}
      });

      audio.addEventListener("ended", () => {
        setPlayingState(false);
        audio.currentTime = 0;
        progressFill.style.width = "0%";
        progressThumb.style.left = "0%";
      });

      audio.addEventListener("play",  () => setPlayingState(true));
      audio.addEventListener("pause", () => setPlayingState(false));

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && !audio.paused) {
          audio.pause();
        }
      });
    })();
  </script>
</body>
</html>
